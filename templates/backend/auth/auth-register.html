<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K-WD Dashboard | Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='backend/assets/build/css/tailwind.css') }}" />
    <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.7.3/dist/alpine.min.js" defer></script>
  </head>
  <body>
    <div class="flex flex-col items-center justify-center min-h-screen p-4 space-y-4 antialiased text-gray-900 bg-gray-100 dark:bg-dark dark:text-light">
      <main>
        <div class="w-full max-w-sm px-4 py-6 space-y-6 bg-white rounded-md dark:bg-darker">
          
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for category, message in messages %}
                <div class="p-3 text-sm rounded bg-{{ 'green' if category == 'success' else 'red' }}-100 text-{{ 'green' if category == 'success' else 'red' }}-700">
                  {{ message }}
                </div>
              {% endfor %}
            {% endif %}
          {% endwith %}

          <h1 class="text-xl font-semibold text-center">Register</h1>

          <form action="{{ url_for('main.register') }}" method="POST" class="space-y-6">
            <input
              class="w-full px-4 py-2 border rounded-md dark:bg-darker dark:border-gray-700"
              type="text" name="username" placeholder="Username" required
            />
            <input
              class="w-full px-4 py-2 border rounded-md dark:bg-darker dark:border-gray-700"
              type="text" name="fullname" placeholder="Fullname" required
            />
            <input
              class="w-full px-4 py-2 border rounded-md dark:bg-darker dark:border-gray-700"
              type="email" name="email" placeholder="Email address" required
            />
            <input
              class="w-full px-4 py-2 border rounded-md dark:bg-darker dark:border-gray-700"
              type="password" name="password" placeholder="Password" required
            />
            <input
              class="w-full px-4 py-2 border rounded-md dark:bg-darker dark:border-gray-700"
              type="password" name="password_confirmation" placeholder="Confirm Password" required
            />
            
            <button
              type="submit"
              class="w-full px-4 py-2 font-medium text-center text-white rounded-md bg-primary hover:bg-primary-dark"
            >
              Register
            </button>
          </form>

          <div class="text-sm text-gray-600 dark:text-gray-400">
            Already have an account? <a href="{{ url_for('main.login') }}" class="text-blue-600 hover:underline">Login</a>
          </div>
        </div>
      </main>
    </div>

    	   <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Flash message handling with SweetAlert2 -->
<script>
   // Flash message handling with SweetAlert2
   const flashMessages = {{ get_flashed_messages(with_categories=True) | tojson | safe }};
   
   if (flashMessages.length > 0) {
       const [category, message] = flashMessages[0];
   
       const Toast = Swal.mixin({
           toast: true,
           position: 'top-end',
           showConfirmButton: false,
           timer: 3000,
           timerProgressBar: true,
           background: '#fff',
           color: '#333',
           didOpen: (toast) => {
               toast.addEventListener('mouseenter', Swal.stopTimer)
               toast.addEventListener('mouseleave', Swal.resumeTimer)
           }
       });
   
       Toast.fire({
           icon: category === "success" ? "success" : "info",
           title: message
       });
   }
</script>




  </body>
</html>
