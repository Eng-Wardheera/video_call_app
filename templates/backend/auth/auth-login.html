<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K-WD Dashboard | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='backend/assets/build/css/tailwind.css') }}" />
    <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.7.3/dist/alpine.min.js" defer></script>
  </head>
  <body>
    <div class="flex flex-col items-center justify-center min-h-screen p-4 bg-gray-100 dark:bg-dark">
      <main class="w-full max-w-sm">
        <div class="px-4 py-6 space-y-6 bg-white rounded-md dark:bg-darker">
          <h1 class="text-xl font-semibold text-center">Login</h1>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for category, message in messages %}
                <div class="p-3 text-sm text-center text-white rounded {{ 'bg-green-500' if category == 'success' else 'bg-red-500' }}">
                  {{ message }}
                </div>
              {% endfor %}
            {% endif %}
          {% endwith %}

          <form action="{{ url_for('main.login') }}" method="POST" class="space-y-6">
            <input
              class="w-full px-4 py-2 border rounded-md dark:bg-darker dark:border-gray-700"
              type="email" name="email" placeholder="Email address" required
            />
            <input
              class="w-full px-4 py-2 border rounded-md dark:bg-darker dark:border-gray-700"
              type="password" name="password" placeholder="Password" required
            />
            
            <div class="flex items-center justify-between">
              <label class="flex items-center">
                <input type="checkbox" name="remembr_me" class="toggle" />
                <span class="ml-3 text-sm text-gray-500 dark:text-gray-400">Remember me</span>
              </label>
              <a href="#" class="text-sm text-blue-600 hover:underline">Forgot Password?</a>
            </div>

            <button type="submit" class="w-full px-4 py-2 font-medium text-white rounded-md bg-primary hover:bg-primary-dark">
              Login
            </button>
          </form>

          <div class="text-sm text-gray-600 dark:text-gray-400">
            Don't have an account yet? <a href="{{ url_for('main.register') }}" class="text-blue-600 hover:underline">Register</a> or Go  <a href="{{ url_for('main.index') }}" class="text-blue-600 hover:underline">Home</a>
          </div>
        </div>
      </main>
    </div>



    	   <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Flash message handling with SweetAlert2 -->
<script>
   // Flash message handling with SweetAlert2
   const flashMessages = {{ get_flashed_messages(with_categories=True) | tojson | safe }};
   
   if (flashMessages.length > 0) {
       const [category, message] = flashMessages[0];
   
       const Toast = Swal.mixin({
           toast: true,
           position: 'top-end',
           showConfirmButton: false,
           timer: 3000,
           timerProgressBar: true,
           background: '#fff',
           color: '#333',
           didOpen: (toast) => {
               toast.addEventListener('mouseenter', Swal.stopTimer)
               toast.addEventListener('mouseleave', Swal.resumeTimer)
           }
       });
   
       Toast.fire({
           icon: category === "success" ? "success" : "info",
           title: message
       });
   }
</script>





  </body>

  
</html>
