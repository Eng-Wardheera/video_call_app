{% extends 'backend/home/base.html' %}

{% block title %}Add New Project | Management System{% endblock %}

{% block content %}

<div class="main-content mt-4">
    <form method="POST" enctype="multipart/form-data">
        <div class="card border-top-0">
            <div class="card-header p-0">
                <ul class="nav nav-tabs flex-wrap w-100 text-center customers-nav-tabs">
                    <li class="nav-item flex-fill border-top"><a href="#infoTab" class="nav-link active" data-bs-toggle="tab">General Info</a></li>
                    <li class="nav-item flex-fill border-top"><a href="#mediaTab" class="nav-link" data-bs-toggle="tab">Media</a></li>
                    <li class="nav-item flex-fill border-top"><a href="#socialTab" class="nav-link" data-bs-toggle="tab">Social Links</a></li>
                </ul>
            </div>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="infoTab">
                    <div class="card-body">
                         <div class="row mb-4">
                             <div class="col-lg-4"><label class="fw-bold">Project Title:</label></div>
                             <div class="col-lg-8"><input type="text" class="form-control" name="title" required></div>
                         </div>
                         <div class="row mb-4">
                             <div class="col-lg-4"><label class="fw-bold">Description:</label></div>
                             <div class="col-lg-8"><textarea class="form-control" name="description" rows="5"></textarea></div>
                         </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="mediaTab">
                    <div class="card-body">
                        <div class="row mb-4">
                            <div class="col-lg-4"><label class="fw-bold">Thumbnail:</label></div>
                            <div class="col-lg-8">
                                <input type="file" class="form-control" name="thumbnail" id="thumbInput" accept="image/*">
                                <img id="thumbPreview" src="#" alt="Preview" style="max-width: 150px; margin-top: 10px; display: none;">
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-lg-4"><label class="fw-bold">Gallery:</label></div>
                            <div class="col-lg-8">
                                <input type="file" class="form-control" name="gallery" id="galleryInput" multiple accept="image/*">
                                <div id="galleryPreview" class="d-flex flex-wrap gap-2 mt-2"></div>
                            </div>
                        </div>

                        <div class="row mb-4">
    <div class="col-lg-4">
        <label class="fw-bold">Video:</label>
    </div>

    <div class="col-lg-8">
        <div class="row">

            <!-- FILE UPLOAD -->
            <div class="col-md-6">
                <label class="small text-muted">Upload File</label>
                <input type="file"
                       class="form-control"
                       name="video_file"
                       id="videoInput"
                       accept="video/*">

                <video id="videoPreview"
                       controls
                       style="max-width: 100%; margin-top: 10px; display: none;">
                </video>
            </div>

            <!-- VIDEO URL -->
            <div class="col-md-6">
                <label class="small text-muted">Video URL</label>
                <input type="text"
                       class="form-control"
                       name="video_url"
                       id="videoUrl"
                       placeholder="https://...">

                <div id="videoUrlPreview"
                     style="margin-top:10px; display:none;"></div>
            </div>

        </div>
    </div>
</div>

                    </div>
                </div>

                <div class="tab-pane fade" id="socialTab">
                     <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-lg-4"><label class="fw-bold">GitHub URL:</label></div>
                            <div class="col-lg-8"><input type="url" class="form-control" name="github" placeholder="https://github.com/..."></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-lg-4"><label class="fw-bold">Live Demo URL:</label></div>
                            <div class="col-lg-8"><input type="url" class="form-control" name="live_demo" placeholder="https://..."></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-lg-4"><label class="fw-bold">LinkedIn URL:</label></div>
                            <div class="col-lg-8"><input type="url" class="form-control" name="linkedin" placeholder="https://linkedin.com/in/..."></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-lg-4"><label class="fw-bold">Instagram URL:</label></div>
                            <div class="col-lg-8"><input type="url" class="form-control" name="instagram" placeholder="https://instagram.com/..."></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-lg-4"><label class="fw-bold">Facebook URL:</label></div>
                            <div class="col-lg-8"><input type="url" class="form-control" name="facebook" placeholder="https://facebook.com/..."></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-lg-4"><label class="fw-bold">TikTok URL:</label></div>
                            <div class="col-lg-8"><input type="url" class="form-control" name="tiktok" placeholder="https://tiktok.com/@..."></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-footer text-center">
                <button type="submit" class="btn btn-primary"><i class="feather-save me-1"></i> Save Project</button>
            </div>
        </div>
    </form>
</div>

<script>
    document.getElementById("videoUrl").addEventListener("input", function () {
    const url = this.value.trim();
    const fileInput = document.getElementById("videoInput");
    const filePreview = document.getElementById("videoPreview");
    const urlPreview = document.getElementById("videoUrlPreview");

    if (url) {

        let embedUrl = url;

        // convert youtube watch → embed
        if (url.includes("youtube.com/watch")) {
            const videoId = new URL(url).searchParams.get("v");
            embedUrl = `https://www.youtube.com/embed/${videoId}`;
        }

        // convert youtu.be → embed
        if (url.includes("youtu.be/")) {
            const videoId = url.split("/").pop();
            embedUrl = `https://www.youtube.com/embed/${videoId}`;
        }

        urlPreview.style.display = "block";
        urlPreview.innerHTML = `
            <iframe width="100%" height="180"
                src="${embedUrl}"
                frameborder="0"
                allowfullscreen>
            </iframe>
        `;

        // disable file
        fileInput.value = "";
        fileInput.disabled = true;

        filePreview.style.display = "none";
        filePreview.src = "";
    } else {
        urlPreview.innerHTML = "";
        urlPreview.style.display = "none";
        fileInput.disabled = false;
    }
});

</script>

{% endblock %}
