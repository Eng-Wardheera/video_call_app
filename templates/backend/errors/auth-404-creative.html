<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 Page Not Found | School Management</title>
    
    <link rel="shortcut icon" type="image/x-icon"
    href="{{ url_for('static', filename=settings.logo2 ) }}" />


    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='backend/assets/css/bootstrap.min.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='backend/assets/vendors/css/vendors.min.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='backend/assets/css/theme.min.css') }}">

    <style>
        :root {
            --mongo-green: #00684a;
            --mongo-dark: #001e2b;
            --mongo-bright-green: #00ed64;
        }

        body { 
            background-color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .auth-wrapper { display: flex; min-height: 100vh; }

        .auth-left { 
            width: 45%; padding: 40px 60px; display: flex; flex-direction: column; justify-content: center; background: #fff;
        }

        .logo-container { position: absolute; top: 40px; left: 60px; }
        .logo-img { width: 210px; }

        .error-content h1 { 
            font-size: 120px; font-weight: 800; color: var(--mongo-dark); line-height: 1; margin-bottom: 10px; 
        }
        .error-content h1 span { color: var(--mongo-green); }
        
        .error-content h2 { font-size: 28px; font-weight: 700; color: var(--mongo-dark); margin-bottom: 15px; }
        .error-content p { font-size: 16px; color: #5d6c74; margin-bottom: 30px; max-width: 450px; }

        .btn-mongo {
            background-color: var(--mongo-green); color: white; font-weight: 700; border: none;
            padding: 14px 30px; border-radius: 4px; display: inline-block; text-decoration: none;
            font-size: 15px; transition: 0.3s;
        }
        .btn-mongo:hover { background-color: #004d37; color: white; transform: translateY(-2px); }

        /* Right Panel */
        .auth-right { 
            width: 55%; background-color: var(--mongo-dark); 
            background-image: linear-gradient(rgba(0, 30, 43, 0.85), rgba(0, 30, 43, 0.85)), url('https://webassets.mongodb.com/static/images/atlas/login_background.png'); 
            background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; padding: 60px; color: white;
        }

        .promo-content { text-align: center; }
        .promo-content h3 { font-size: 32px; font-weight: 700; margin-bottom: 20px; color: var(--mongo-bright-green); }
        .error-icon { font-size: 100px; color: var(--mongo-bright-green); margin-bottom: 20px; display: block; }

        @media (max-width: 1024px) {
            .auth-right { display: none; }
            .auth-left { width: 100%; padding: 40px 20px; text-align: center; align-items: center; }
            .logo-container { position: relative; top: 0; left: 0; margin-bottom: 40px; }
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-left">
            <div class="logo-container">
                 <img src="{{ url_for('static', filename=settings.logo) }}" 
     alt="Logo" 
     class="logo-img">
                
            </div>

            <div class="error-content">
                <h1>4<span>0</span>4</h1>
                <h2>Uups! Bogga lama helin</h2>
                <p>Naga raali noqo, bogga aad raadinayso ma jiro ama waa laga raray meeshii uu horay u joogay.</p>
                <a href="{{ url_for('main.login') }}" class="btn-mongo">Ku laabo Hoyga</a>
            </div>
        </div>

        <div class="auth-right">
            <div class="promo-content">
                <i class="feather-alert-triangle error-icon"></i>
                <h3>Page Not Found</h3>
                <p style="font-size: 18px; opacity: 0.8;">Waxaad moodaa inaad dhumisay wadada. Fadlan hubi link-ga aad soo qortay.</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='backend/assets/vendors/js/vendors.min.js') }}"></script>
    <script src="{{ url_for('static', filename='backend/assets/js/common-init.min.js') }}"></script>
</body>

</html>
