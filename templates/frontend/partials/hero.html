<!-- CV MODAL -->
<div id="cvModal" class="cv-modal">
    <div class="cv-modal-content">
        <span class="cv-close" onclick="closeCVModal()">&times;</span>

        <iframe 
            src="https://drive.google.com/file/d/1V6rsO4sa9nn-S_OVEw5oVn-V0GoKDqvl/preview"
            width="100%" 
            height="600px">
        </iframe>
    </div>
</div>

<style>
.cv-modal {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

.cv-modal-content {
    background: #fff;
    margin: 5% auto;
    padding: 10px;
    width: 80%;
    max-width: 900px;
    border-radius: 8px;
    position: relative;
}

.cv-close {
    position: absolute;
    right: 15px;
    top: 5px;
    font-size: 30px;
    cursor: pointer;
}

/* disable selection */
body {
    user-select: none;
    -webkit-user-select: none;
}
</style>

<script>
function openCVModal() {
    document.getElementById("cvModal").style.display = "block";
}

function closeCVModal() {
    document.getElementById("cvModal").style.display = "none";
}

window.addEventListener("click", function(event) {
    let modal = document.getElementById("cvModal");
    if (event.target === modal) {
        modal.style.display = "none";
    }
});

document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("copy", e => e.preventDefault());
</script>
