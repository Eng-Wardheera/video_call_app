<section class="ftco-section bg-light" id="projects-section">
  <div class="container">

    <!-- TITLE -->
<div class="row">
  <div class="col-12">
    <div class="d-flex flex-wrap align-items-center section-title">

      <h2 class="mb-0 text-nowrap mr-3">Our Projects</h2>

      <div class="border-top flex-grow-1 border-primary"></div>

      <a href="{{ url_for('main.all_projects_view') }}"
         class="see-more text-primary small ml-auto">
        See more
      </a>

    </div>
  </div>
</div>


    <!-- SEARCH + COUNTER -->
    <div class="row mb-4 align-items-center">

      <div class="col-md-6 mb-2">
        <input type="text" id="projectSearch" class="form-control"
               placeholder="Search projects...">
      
      </div>

      <div class="col-md-6 text-md-right">
        <div class="text">
          <strong class="number" data-number="{{ project_count }}">{{ project_count }}</strong>
          <span>Project Complete</span>
        </div>
      </div>

    </div>

    <!-- PROJECT LIST -->
    <div class="row justify-content-left" id="projectList">

      {% for project in projects %}
      <div class="col-lg-4 col-sm-6 mb-5 project-item">

        <div class="card p-0 border-primary rounded-0 hover-shadow" style="cursor:pointer;">

          <div class="position-relative" onclick="openProjectModal(this)"
               data-title="{{ project.title }}"
               data-desc="{{ project.description }}"
               data-video="{{ project.video_path or '' }}"
               data-url="{{ project.video_url or '' }}">

            <img class="card-img-top rounded-0"
                 src="{{ url_for('static', filename=project.thumbnail) }}"
                 height="230"
                 style="object-fit:cover;">

            <div class="play-overlay"
                 style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none;">
              <i class="fa fa-play-circle text-white"
                 style="font-size:60px; opacity:0.8;"></i>
            </div>

          </div>

          <div class="card-body">

            <ul class="list-inline mb-2">
              <li class="list-inline-item">
                <i class="ti-calendar mr-1 text-color"></i>
                {{ project.created_at.strftime('%m-%d-%Y') }}
              </li>
            </ul>

            <h4 class="card-title">{{ project.title }}</h4>

            <p class="card-text mb-4">
              {{ project.description|truncate(50, True, '...') }}
            </p>

            <a href="{{ url_for('main.single_project', project_id=project.id) }}"
               class="btn btn-primary btn-sm">
              View Details
            </a>

          </div>

        </div>
      </div>
      {% endfor %}

    </div>
  </div>
</section>


<!-- ================= MODAL ================= -->
<div class="modal fade" id="projectModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header border-0">
        <h5 class="modal-title" id="modalTitle">Project Title</h5>

        <!-- CLOSE BUTTON -->
        <button type="button"
                onclick="closeProjectModal()"
                style="
                  border:none;
                  background:transparent;
                  font-size:28px;
                  font-weight:bold;
                  color:#000;
                  cursor:pointer;
                ">
          &times;
        </button>

      </div>

      <div class="modal-body">

        <div id="videoContainer" class="mb-3 d-flex justify-content-center"></div>

        <p id="modalDesc" class="mt-3 text-muted"></p>

      </div>

    </div>
  </div>
</div>


<!-- ================= JS ================= -->
<script>

let projectModalInstance = null;

/* OPEN MODAL */
function openProjectModal(element) {

    const modalEl = document.getElementById('projectModal');

    document.getElementById('modalTitle').innerText = element.getAttribute('data-title');
    document.getElementById('modalDesc').innerText = element.getAttribute('data-desc');

    const videoContainer = document.getElementById('videoContainer');
    videoContainer.innerHTML = '';

    const videoPath = element.getAttribute('data-video');
    const videoUrl = element.getAttribute('data-url');

    /* LOCAL VIDEO */
    if (videoPath && videoPath !== "None" && videoPath !== "") {
        videoContainer.innerHTML = `
            <video id="modalVideo" width="100%" controls autoplay class="shadow rounded">
                <source src="/static/${videoPath}" type="video/mp4">
            </video>
        `;
    }

    /* YOUTUBE / URL */
    else if (videoUrl && videoUrl !== "None" && videoUrl !== "") {

        let videoId = null;

        if (videoUrl.includes("youtu.be/")) {
            videoId = videoUrl.split("/").pop().split("?")[0];
        }
        else if (videoUrl.includes("watch?v=")) {
            videoId = new URL(videoUrl).searchParams.get("v");
        }

        const embed = videoId
            ? `https://www.youtube.com/embed/${videoId}?autoplay=1`
            : videoUrl;

        videoContainer.innerHTML = `
            <iframe id="modalFrame"
                width="100%" height="400"
                src="${embed}"
                frameborder="0"
                allow="autoplay; encrypted-media"
                allowfullscreen>
            </iframe>
        `;
    }

    projectModalInstance = new bootstrap.Modal(modalEl);
    projectModalInstance.show();
}


/* CLOSE MODAL (FULL FIX) */
function closeProjectModal() {

    const modalEl = document.getElementById('projectModal');

    if (projectModalInstance) {
        projectModalInstance.hide();
    } else {
        bootstrap.Modal.getInstance(modalEl)?.hide();
    }

    clearVideo();
}


/* CLEAR VIDEO (STOP PLAYBACK) */
function clearVideo() {

    const videoContainer = document.getElementById("videoContainer");

    /* remove iframe completely */
    videoContainer.innerHTML = '';

    /* stop HTML5 video if exists */
    const video = document.getElementById("modalVideo");
    if (video) {
        video.pause();
        video.currentTime = 0;
    }
}


/* AUTO CLEAR ON CLOSE */
document.getElementById('projectModal')
.addEventListener('hidden.bs.modal', function () {
    clearVideo();
});


/* SEARCH */
document.getElementById("projectSearch").addEventListener("keyup", function () {
    let value = this.value.toLowerCase();

    document.querySelectorAll(".project-item").forEach(item => {
        item.style.display = item.innerText.toLowerCase().includes(value) ? "" : "none";
    });
});

</script>
