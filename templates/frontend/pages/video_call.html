<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Call System</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body {
    background:#0b1220;
    color:white;
    height:100vh;
    overflow:hidden;
}

/* MAIN */
.container {
    display:flex;
    height:100vh;
}

/* USERS */
.users {
    width:22%;
    min-width:200px;
    background:#111827;
    padding:12px;
    overflow-y:auto;
}

.user {
    padding:10px;
    margin-bottom:8px;
    background:#1f2937;
    border-radius:8px;
    cursor:pointer;
}

.user:hover {
    background:#374151;
}

/* VIDEO */
.video-area {
    flex:1;
    position:relative;
    display:flex;
    flex-direction:column;
    background:black;
}

.remote-video {
    flex:1;
    position:relative;
}

video {
    width:100%;
    height:100%;
    object-fit:cover;
    background:black;
}

/* LOCAL VIDEO */
.local-video {
    position:absolute;
    bottom:90px;
    right:15px;
    width:140px;
    height:100px;
    border:2px solid #38bdf8;
    border-radius:10px;
    overflow:hidden;
    z-index:10;
}

/* CONTROLS */
.controls {
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    background:#111827;
}

button {
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.call { background:#22c55e; }
.end { background:#ef4444; }
.mute { background:#38bdf8; }

/* CHAT */
.chat {
    width:28%;
    min-width:250px;
    display:flex;
    flex-direction:column;
    background:#111827;
}

.messages {
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.msg {
    background:#1f2937;
    padding:8px;
    margin-bottom:6px;
    border-radius:8px;
}

.input-box {
    display:flex;
    padding:10px;
    background:#0f172a;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    outline:none;
}

.send {
    margin-left:8px;
    background:#38bdf8;
}

/* POPUP */
.popup {
    position:fixed;
    top:20px;
    right:20px;
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    width:220px;
    display:none;
    z-index:999;
}

.popup button {
    width:100%;
    margin-top:8px;
}

.accept { background:#22c55e; }
.reject { background:#ef4444; }

/* RESPONSIVE */
@media (max-width:900px) {
    .container { flex-direction:column; }

    .users {
        width:100%;
        display:flex;
        overflow-x:auto;
        gap:8px;
    }

    .user {
        min-width:140px;
        text-align:center;
    }

    .chat {
        width:100%;
        height:220px;
    }

    .video-area {
        height:calc(100vh - 320px);
    }

    .local-video {
        width:100px;
        height:80px;
    }
}
</style>
</head>

<body>

<div class="container">

<!-- USERS -->
<div class="users">
    <h3>Online</h3>
</div>

<!-- VIDEO -->
<div class="video-area">

    <div class="remote-video">
        <video id="remoteVideo" autoplay playsinline></video>

        <div class="local-video">
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
    </div>

    <div class="controls">
        <button class="call">Call</button>
        <button class="mute">Mute</button>
        <button class="end">End</button>
    </div>

</div>

<!-- CHAT -->
<div class="chat">
    <div class="messages"></div>

    <div class="input-box">
        <input id="msgInput" placeholder="message..." />
        <button class="send">Send</button>
    </div>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div id="popupText">Incoming call</div>
    <button class="accept">Accept</button>
    <button class="reject">Reject</button>
</div>

<script>
const socket = io();

const currentUser = {
    id: "{{ current_user.id }}",
    name: "{{ current_user.fullname }}"
};

let selectedUser = null;
let inCall = false;
let currentCallId = null;

/* CAMERA FIX (IMPORTANT) */
async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true
        });

        document.getElementById("localVideo").srcObject = stream;

    } catch (err) {
        alert("Camera error: " + err.message);
    }
}

/* START CAMERA IMMEDIATELY */
startCamera();

/* SOCKET JOIN */
socket.emit("join_call", currentUser);

/* USERS */
socket.on("online_users", users => {
    const box = document.querySelector(".users");
    box.innerHTML = "<h3>Online</h3>";

    users.forEach(u => {
        const div = document.createElement("div");
        div.className = "user";
        div.innerText = u.name;

        div.onclick = () => selectedUser = u;

        box.appendChild(div);
    });
});

/* CHAT */
function addMsg(from, text){
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<b>${from}:</b> ${text}`;
    document.querySelector(".messages").appendChild(div);
}

document.querySelector(".send").onclick = () => {
    if(inCall) return alert("Chat disabled");

    const text = document.getElementById("msgInput").value;
    if(!text) return;

    socket.emit("send_message", {
        from: currentUser,
        to: selectedUser,
        text
    });

    document.getElementById("msgInput").value = "";
};

socket.on("receive_message", data => {
    addMsg(data.from, data.text);
});

/* CALL */
document.querySelector(".call").onclick = () => {
    if(!selectedUser) return alert("Select user");

    inCall = true;

    socket.emit("start_call", {
        from: currentUser,
        to: selectedUser
    });

    addMsg("System", "Calling " + selectedUser.name);
};

/* END */
document.querySelector(".end").onclick = () => {
    inCall = false;

    socket.emit("end_call", {
        call_id: currentCallId
    });
};

/* POPUP */
socket.on("incoming_call", data => {
    const popup = document.getElementById("popup");
    popup.style.display = "block";

    document.getElementById("popupText").innerText =
        "Call from " + data.from.name;

    currentCallId = data.call_id;

    document.querySelector(".accept").onclick = () => {
        popup.style.display = "none";
        inCall = true;
    };

    document.querySelector(".reject").onclick = () => {
        popup.style.display = "none";
    };
});

socket.on("call_ended", () => {
    inCall = false;
});
</script>

</body>
</html>
